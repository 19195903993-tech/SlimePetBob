<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>魔法精灵队伍管理原型</title>
  <link rel="stylesheet" href="prototype.css" />
</head>
<body>
  <div class="app" role="application" aria-label="魔法精灵队伍管理原型">
    <div class="magic-overlay" aria-hidden="true"></div>

    <aside class="panel team-panel">
      <header class="team-header">
        <p class="panel-sub">动态文本区域</p>
        <h1 id="teamTitle">队伍 1</h1>
      </header>

      <div class="team-list-wrap">
        <button id="teamPrev" class="icon-btn" aria-label="上一页队伍">▲</button>
        <div class="team-list" id="teamList"></div>
        <button id="teamNext" class="icon-btn" aria-label="下一页队伍">▼</button>
      </div>

      <p id="teamPageIndicator" class="page-indicator">第 1 / 4 页</p>
    </aside>

    <main class="panel bag-panel">
      <header class="bag-header">
        <div>
          <p class="panel-sub">精灵背包</p>
          <h2>5 × 6 精灵槽位</h2>
        </div>
        <p id="bagPageIndicator" class="page-indicator">第 1 / 3 页（30/页）</p>
      </header>

      <div class="bag-actions-top">
        <button id="bagPrev" class="icon-btn" aria-label="上一页背包">上一页</button>
        <button id="bagNext" class="icon-btn" aria-label="下一页背包">下一页</button>
      </div>

      <section class="bag-grid" id="bagGrid" aria-label="精灵背包网格"></section>

      <footer class="bag-footer">
        <button id="toggleBoxBtn" class="cta-btn">打开盒子面板（Dockable Panel_box）</button>
      </footer>
    </main>

    <section class="panel role-panel" id="rolePanel">
      <button id="closeRoleBtn" class="close-btn" aria-label="关闭角色展示">✕</button>

      <div class="role-display" id="roleDisplay">
        <div class="role-image" id="roleImage" aria-hidden="true"></div>
        <div class="role-meta">
          <p class="panel-sub">默认展示</p>
          <h3 id="roleName">未选择精灵</h3>
          <p id="roleDesc">请选择一个精灵槽位查看详情。默认展示第一只已选中精灵。</p>
        </div>
      </div>

      <div class="dock-toggle-wrap" id="dockToggleWrap">
        <button id="btnOpen" class="open-btn" aria-expanded="false">
          <span>⟷</span>
          <strong>btn_open</strong>
        </button>
      </div>

      <div class="dock-panel" id="dockRolePanel" aria-hidden="true">
        <div class="dock-content">
          <h4>Dockable Panel_role</h4>
          <p id="dockText">详细信息面板，包含精灵属性、技能、关系链。</p>
          <ul>
            <li>元素：奥术 / 星辉</li>
            <li>稀有度：SSR</li>
            <li>状态：待命</li>
          </ul>
        </div>
      </div>

      <div class="box-panel" id="boxPanel" aria-hidden="true">
        <h4>Dockable Panel_box</h4>
        <p>盒子面板已展开。这里可放置扩展库存、筛选器与拖拽逻辑。</p>
        <button id="collapseBoxBtn" class="collapse-btn">收起</button>
      </div>
    </section>
  </div>

  <script src="prototype.js"></script>
</body>
</html>
